<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeadCRM - Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script type="module" src="firebase-config.js"></script>
<script type="module" src="auth.js"></script>
<style>
:root{
  --bg:#060b18;--surface:#0d1526;--surface2:#131d34;--border:#1e2d4d;
  --accent:#3b82f6;--accent-dim:rgba(59,130,246,0.15);
  --green:#22c55e;--green-dim:rgba(34,197,94,0.15);
  --red:#ef4444;--orange:#f59e0b;--purple:#a855f7;
  --text:#e2e8f0;--text-muted:#64748b;--text-dim:#94a3b8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
.screen{display:none;}.screen.active{display:block;}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;}
.login-bg{position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 20%,rgba(59,130,246,0.08),transparent 60%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(168,85,247,0.06),transparent 60%),var(--bg);z-index:0;}
.login-grid{position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;opacity:.22;z-index:0;}
.login-card{position:relative;z-index:1;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:48px 44px;width:100%;max-width:420px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.5);}
.login-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:2.2rem;color:var(--accent);letter-spacing:-1px;margin-bottom:6px;}
.login-logo span{color:var(--text-muted);font-weight:400;}
.login-tagline{font-size:.85rem;color:var(--text-muted);margin-bottom:40px;line-height:1.6;}
.google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:15px 24px;background:white;color:#1f2937;border:none;border-radius:12px;font-size:.95rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(0,0,0,.3);}
.google-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.4);}
.google-btn svg{width:20px;height:20px;flex-shrink:0;}
.login-note{margin-top:20px;font-size:.75rem;color:var(--text-muted);line-height:1.6;}

.toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:white;padding:12px 22px;border-radius:10px;font-size:.875rem;font-weight:600;z-index:9999;transform:translateY(100px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;max-width:320px;}
.toast.show{transform:translateY(0);opacity:1;}

@media(max-width:600px){
  .login-card{padding:36px 22px;}
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ══ LOGIN SCREEN ══ -->
<div id="loginScreen" class="screen active">
  <div class="login-bg"></div>
  <div class="login-grid"></div>
  <div class="login-card">
    <div class="login-logo">Lead<span>CRM</span></div>
    <div class="login-tagline">Shop calling &amp; lead management<br>for your sales team</div>
    <button class="google-btn" id="googleSignInBtn">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Continue with Google
    </button>
    <div class="login-note">After signing in, an admin must approve your account<br>before you can access the system.</div>
  </div>
</div>

</body>
</html>

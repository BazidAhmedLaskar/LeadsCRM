<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeadCRM - Pending Approval</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script type="module" src="firebase-config.js"></script>
<script type="module" src="auth.js"></script>
<style>
:root{
  --bg:#060b18;--surface:#0d1526;--surface2:#131d34;--border:#1e2d4d;
  --accent:#3b82f6;--accent-dim:rgba(59,130,246,0.15);
  --green:#22c55e;--green-dim:rgba(34,197,94,0.15);
  --red:#ef4444;--orange:#f59e0b;--purple:#a855f7;
  --text:#e2e8f0;--text-muted:#64748b;--text-dim:#94a3b8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
.screen{display:none;}.screen.active{display:block;}

/* PENDING */
#pendingScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.pending-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:48px 40px;max-width:440px;width:100%;text-align:center;}
.pending-icon{font-size:3.5rem;margin-bottom:20px;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.pending-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.4rem;margin-bottom:10px;}
.pending-sub{font-size:.88rem;color:var(--text-muted);line-height:1.7;margin-bottom:28px;}
.user-pill{display:inline-flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:30px;padding:8px 18px;font-size:.82rem;color:var(--text-dim);margin-bottom:24px;}
.user-pill img{width:26px;height:26px;border-radius:50%;}

.btn{padding:10px 15px;border-radius:10px;border:none;font-size:.82rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .18s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;}
.btn-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--text-dim);color:var(--text);}

.toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:white;padding:12px 22px;border-radius:10px;font-size:.875rem;font-weight:600;z-index:9999;transform:translateY(100px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;max-width:320px;}
.toast.show{transform:translateY(0);opacity:1;}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ══ PENDING SCREEN ══ -->
<div id="pendingScreen" class="screen active">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
    <div class="pending-card">
      <div class="pending-icon">⏳</div>
      <div class="pending-title">Waiting for Approval</div>
      <div class="pending-sub">Your account has been submitted. An admin needs to approve you before you can use LeadCRM.<br><br>Contact your team admin.</div>
      <div class="user-pill" id="pendingPill"><span id="pendingEmail">—</span></div>
      <button class="btn btn-ghost" id="pendingSignoutBtn" style="width:100%">Sign Out</button>
    </div>
  </div>
</div>

</body>
</html>
